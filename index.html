<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0d2b45">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="DMT Guide">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>DMT FOH Shift Guide</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icons/icon-192.png">
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="top-bar">
        <div class="brand-row">
          <img
            alt="Prince of Wales Theatre exterior on Coventry Street"
            class="brand-image"
            height="72"
            src="./assets/prince-of-wales-theatre-tower.jpg"
            width="72"
          >
          <div>
            <p class="venue">Delfont Mackintosh Theatres</p>
            <h1>DMT FOH Shift Guide</h1>
            <p class="production">Prince of Wales Theatre</p>
          </div>
        </div>
        <div class="release-tools">
          <div class="release-pill" id="versionLabel">Version 3.0.0</div>
          <button class="text-action release-link" id="releaseNotesButton" type="button">
            What's New
          </button>
        </div>
      </header>

      <section class="update-panel" hidden id="updatePanel">
        <p>A new version is available.</p>
        <button class="primary-action" id="updateButton" type="button">Update</button>
      </section>

      <section class="install-panel" hidden id="installPanel">
        <div>
          <p class="panel-label">Install for offline use</p>
          <h2>Keep this assistant on your phone</h2>
        </div>
        <div class="install-steps" id="installSteps"></div>
        <button class="primary-action" hidden id="androidInstallButton" type="button">
          Install App
        </button>
      </section>

      <nav class="step-tabs" aria-label="Shift setup progress" id="stepTabs"></nav>

      <section class="workflow" id="workflow" aria-live="polite">
        <div class="empty-state">
          <p>Loading shift data</p>
        </div>
      </section>

      <dialog class="release-dialog" id="releaseDialog">
        <form method="dialog">
          <div class="release-dialog-header">
            <h2>What's New</h2>
            <button class="text-action" type="submit">Close</button>
          </div>
          <div class="release-notes-content"></div>
        </form>
      </dialog>

      <footer class="credits">
        <button class="text-action" id="installHelpButton" type="button">Install guide</button>
        <span>DMT FOH Shift Guide. Photo crop: Bernard Gagnon, Wikimedia Commons, CC BY-SA 3.0 / GFDL.</span>
      </footer>
    </main>

    <script src="./version.js"></script>
    <script src="./data/master-data.js"></script>
    <script src="./app.js" defer></script>
  </body>
</html>
