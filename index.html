<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0d2b45">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="POW Access">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Prince of Wales Accessibility Assistant</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icons/icon-192.png">
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="top-bar">
        <div class="brand-row">
          <img
            alt="Prince of Wales Theatre exterior on Coventry Street"
            class="brand-image"
            height="72"
            src="./assets/prince-of-wales-theatre-900.jpg"
            width="72"
          >
          <div>
            <p class="venue">Prince of Wales Theatre</p>
            <h1>Accessibility Assistant</h1>
            <p class="production">My Shift Tonight</p>
          </div>
        </div>
        <div class="release-pill" id="versionLabel">Version 2.0.0</div>
      </header>

      <section class="update-panel" hidden id="updatePanel">
        <p>A new version is available.</p>
        <button class="primary-action" id="updateButton" type="button">Update</button>
      </section>

      <section class="install-panel" hidden id="installPanel">
        <div>
          <p class="panel-label">Install for offline use</p>
          <h2>Keep this assistant on your phone</h2>
        </div>
        <div class="install-steps" id="installSteps"></div>
        <button class="primary-action" hidden id="androidInstallButton" type="button">
          Install App
        </button>
      </section>

      <nav class="step-tabs" aria-label="Shift setup progress" id="stepTabs"></nav>

      <section class="workflow" id="workflow" aria-live="polite">
        <div class="empty-state">
          <p>Loading shift data</p>
        </div>
      </section>

      <footer class="credits">
        <button class="text-action" id="installHelpButton" type="button">Install guide</button>
        <span>Photo: Bernard Gagnon, Wikimedia Commons, CC BY-SA 3.0 / GFDL.</span>
      </footer>
    </main>

    <script src="./version.js"></script>
    <script src="./data/master-data.js"></script>
    <script src="./app.js" defer></script>
  </body>
</html>
