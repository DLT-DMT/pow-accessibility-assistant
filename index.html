<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0d2b45">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="POW Access">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Prince of Wales Accessibility Assistant</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icons/icon-192.png">
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="top-bar">
        <div class="brand-row">
          <img
            alt="Prince of Wales Theatre exterior on Coventry Street"
            class="brand-image"
            height="72"
            src="./assets/prince-of-wales-theatre-900.jpg"
            width="72"
          >
          <div>
            <p class="venue">Prince of Wales Theatre</p>
            <h1>Accessibility Assistant</h1>
            <p class="production">The Book of Mormon</p>
          </div>
        </div>

        <div class="mode-switch" aria-label="Accessibility profile" id="profileControls"></div>
      </section>

      <section class="summary-strip" aria-label="Status totals" id="summaryStrip"></section>

      <section class="install-panel" hidden id="installPanel">
        <div>
          <p class="panel-label">Install for offline use</p>
          <h2>Keep this assistant on your phone</h2>
        </div>
        <div class="install-steps" id="installSteps"></div>
        <button class="primary-action" hidden id="androidInstallButton" type="button">
          Install App
        </button>
      </section>

      <section class="update-panel" hidden id="updatePanel">
        <p>A new version is available.</p>
        <button class="primary-action" id="updateButton" type="button">Update</button>
      </section>

      <section class="filters">
        <label class="search-field">
          <span>Search</span>
          <input
            autocomplete="off"
            id="searchInput"
            placeholder="Track, task, barrier, adjustment"
            type="search"
          >
        </label>

        <div class="filter-row" aria-label="Status filter" id="statusFilters"></div>
      </section>

      <div class="content-grid">
        <section class="track-list" aria-label="Tracks" id="trackList"></section>
        <section class="detail-panel" aria-label="Track detail" id="trackDetail"></section>
      </div>

      <footer class="credits">
        <span id="versionLabel">Version 1.0.0</span>
        <button class="text-action" id="installHelpButton" type="button">Install guide</button>
        <span>Photo: Bernard Gagnon, Wikimedia Commons, CC BY-SA 3.0 / GFDL.</span>
      </footer>
    </main>

    <script src="./version.js"></script>
    <script src="./data/tracks-data.js"></script>
    <script src="./app.js" defer></script>
  </body>
</html>
